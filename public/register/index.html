<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Dashboard - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join our investment platform</p>
            </div>
            
            <div id="error-message" class="error-message" style="display: none;"></div>
            <div id="success-message" class="success-message" style="display: none;"></div>
            
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Re-enter your password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" id="register-btn">
                    <span class="btn-text">Create Account</span>
                    <span class="loading-spinner" style="display: none;"></span>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="/login/">Sign in here</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from '/js/firebase.js';
        import { createUserWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';
        import { doc, setDoc } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';
        
        // Redirect if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = '/dashboard/';
        });

        const registerForm = document.getElementById('register-form');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');
        const registerBtn = document.getElementById('register-btn');
        const btnText = registerBtn.querySelector('.btn-text');
        const spinner = registerBtn.querySelector('.loading-spinner');
        
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match';
                errorMessage.style.display = 'block';
                return;
            }
            
            btnText.style.display = 'none';
            spinner.style.display = 'inline-block';
            registerBtn.disabled = true;
            
            try {
                // Create Firebase Auth user
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Create Firestore user document — role is always 'user' here
                // Firestore rules also enforce this; it cannot be changed by the user later
                await setDoc(doc(db, 'users', user.uid), {
                    name: name,
                    email: email,
                    role: 'user',
                    profit: 0,
                    availableBalance: 0,
                    totalInProgress: 0,
                    totalInvested: 0,
                    bankDetails: {},
                    createdAt: new Date().toISOString()
                });
                
                successMessage.textContent = 'Account created successfully! Redirecting to dashboard...';
                successMessage.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = '/dashboard/';
                }, 2000);
                
            } catch (error) {
                console.error('Registration error:', error);
                let errorMsg = 'Registration failed. Please try again.';
                
                if (error.code === 'auth/email-already-in-use') {
                    errorMsg = 'This email is already registered';
                } else if (error.code === 'auth/weak-password') {
                    errorMsg = 'Password should be at least 6 characters';
                } else if (error.code === 'auth/invalid-email') {
                    errorMsg = 'Invalid email address';
                }
                
                errorMessage.textContent = errorMsg;
                errorMessage.style.display = 'block';
            } finally {
                btnText.style.display = 'inline';
                spinner.style.display = 'none';
                registerBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
